profile-desc: |
  Product Director with over 15 years of experience, specializing in transforming strategic visions into profitable SaaS platforms (B2B/B2B2C). I operate across a 360° scope, driving product strategy, profitability (ROI), and technical direction (Cloud & AI). My expertise lies at the intersection of User Experience and data exploitation (IoT, Smart Context), with proven success in designing and deploying Smart Office and Smart Campus solutions including indoor geolocation (Polestar SDK) and occupancy management for complex environments.
