profile-desc: |
  Directeur Produit avec plus de 15 ans d'expérience, spécialisé dans la transformation de visions stratégiques en plateformes SaaS rentables (B2B/B2B2C). J'interviens sur un périmètre 360°, pilotant la stratégie produit, la rentabilité (ROI) et la direction technique (Cloud & IA). Mon expertise se situe à la croisée de l'Expérience Utilisateur et de l'exploitation de la donnée (IoT, Smart Context), avec des succès prouvés dans la conception et le déploiement de solutions Smart Office et Smart Campus incluant la géolocalisation indoor (SDK Polestar) et la gestion de l'occupation pour des environnements complexes.
