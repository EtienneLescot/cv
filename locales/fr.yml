profile-desc: |
  Directeur Produit et Tech avec plus de 15 ans d'expérience, spécialisé dans la transformation de visions stratégiques en plateformes SaaS rentables (B2B/B2B2C). J'interviens sur un périmètre 360°, pilotant la stratégie produit, la direction technique (Cloud & IA), et l'alignement business. Mon expertise se situe à la croisée de l'expérience utilisateur et de l'exploitation de la donnée (IoT, contexte intelligent), avec une appétence particulière pour les solutions Smart Building et la géolocalisation indoor.
