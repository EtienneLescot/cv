profile-desc: |
  Directeur Produit & Tech (CTO) avec plus de 15 ans d'expérience, spécialisé dans la transformation de visions stratégiques en plateformes SaaS B2B/B2B2C rentables. J'interviens sur un périmètre 360°, pilotant la stratégie produit (roadmap, UX), la direction technique (Cloud, IA) et la performance business (ROI, scalabilité). Mon profil est à la croisée de l'innovation produit et de l'excellence technique.
skills-title: |
  Compétences 360°
# Refonte complète des compétences pour suivre votre priorisation (1. Produit, 2. Tech, 3. IA, 4. DevOps, 5. Agile, 6. Dev)
skill-1: |
  <strong>Stratégie Produit & Vision 360°</strong><br>
  Pilotage roadmap, vision & cycle de vie produit SaaS B2B, Expérience Utilisateur (UX/UI), analyse ROI & rentabilité, stratégie de scalabilité & Go-to-Market.
skill-2: |
  <strong>Direction Technique & Architecture</strong><br>
  Leadership technique, architecture plateformes SaaS & Cloud (AWS, Scaleway), gestion d'équipes pluridisciplinaires, partenariats techniques & intégration SDK (dont IoT/BLE).
skill-3: |
  <strong>Intelligence Artificielle (IA)</strong><br>
  Intégration stratégique de l'IA (LLM, RAG, AWS Bedrock, Langchain) pour l'optimisation des parcours clients et l'analyse contextuelle.
skill-4: |
  <strong>DevOps & Cloud-Native</strong><br>
  Expertise CI/CD (GitLab, ArgoCD), conteneurisation (Kubernetes, Docker), monitoring, et industrialisation des déploiements multi-instances.
skill-5: |
  <strong>Gestion de Projet & Méthodologie</strong><br>
  Pilotage agile (Scrum), documentation technique & fonctionnelle, gestion de la relation client, coordination d'équipes.
skill-6: |
  <strong>Expertise Développement Full-Stack</strong><br>
  Maîtrise de l'écosystème Node.js, React, Python, garantissant la crédibilité technique et la qualité du code.
