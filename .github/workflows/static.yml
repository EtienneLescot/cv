# Workflow pour déployer le contenu statique sur GitHub Pages
# Gère 2 cas :
# 1. Branche 'main' -> Déploie à la racine (https://.../cv/)
# 2. Branche 'cvclaude' -> Déploie dans le sous-dossier /360/ (https://.../cv/360/)

name: Deploy static content to Pages

on:
  # Exécute sur les pushs vers 'main' ET 'cvclaude'
  push:
    branches: 
      - "main"
      - "cvclaude"

  # Permet de lancer manuellement le workflow
  workflow_dispatch:

# Définit les permissions GLOUTABLES.
# Nous avons besoin de 'contents: write' pour l'action peaceiris (cas 'cvclaude')
# Et de 'pages: write' / 'id-token: write' pour l'action deploy-pages (cas 'main')
permissions:
  contents: write
  pages: write
  id-token: write

# Gère la concurrence pour éviter les déploiements simultanés
# Crée un groupe par branche (ex: "pages-main", "pages-cvclaude")
concurrency:
  group: "pages-${{ github.ref_name }}"
  cancel-in-progress: false

jobs:
  # Tâche de déploiement unique
  deploy:
    # L'environnement "github-pages" ne s'applique QUE si nous déployons la branche 'main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: github.ref_name == 'main' # L'environnement n'est requis que pour le cas 'main'
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Étapes de build (communes aux deux branches) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build project
        run: npm run build
        
      # ---
      # CAS 1 : Déploiement de la branche 'main' (votre méthode actuelle)
      # ---
      - name: Setup Pages (Branche MAIN)
        if: github.ref_name == 'main'
        uses: actions/configure-pages@v5

      - name: Upload artifact (Branche MAIN)
        if: github.ref_name == 'main'
        uses: actions/upload-pages-artifact@v3
        with:
          # ATTENTION: Assurez-vous que './dist' est bien le dossier de sortie de 'npm run build'
          path: './dist' 

      - name: Deploy to GitHub Pages (Branche MAIN)
        if: github.ref_name == 'main'
        id: deployment
        uses: actions/deploy-pages@v4

      # ---
      # CAS 2 : Déploiement de la branche 'cvclaude' vers le dossier /360/
      # ---
      - name: Deploy to /360/ subfolder (Branche CVCLAUDE)
        if: github.ref_name == 'cvclaude'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
          # Branche CIBLE où le contenu sera poussé (votre branche de publication)
          publish_branch: "main" 
          
          # Dossier SOURCE (le résultat de 'npm run build')
          publish_dir: "./dist" 
          
          # Dossier CIBLE sur la branche 'main'
          destination_dir: "360" 
          
          # TRÈS IMPORTANT: Empêche l'action de supprimer 
          # les fichiers existants à la racine (votre déploiement 'main')
          keep_files: true